# Ukrainizer DSM — proxy DSM-server location → root daemon (127.0.0.1:7686).
# Inserted inside the DSM server block via `include conf.d/dsm.*.conf`, so the
# request already carries the logged-in DSM session cookie; the daemon re-validates
# it (CurrentConnection) and gates privileged actions behind the admin password.
location /ua-l10n-api/ {
    proxy_pass http://127.0.0.1:7686/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-SYNO-TOKEN $http_x_syno_token;
    proxy_set_header Connection "";
    proxy_read_timeout 90s;
}
